name: The Crunch — Full Production CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

# Ensures that multiple pushes don't collide and mess up visual snapshots
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Lint & Test (Runs on every push/PR)
  # ─────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: ./server

      - name: Lint frontend
        run: npm run lint

      - name: Lint backend
        run: npm run lint
        working-directory: ./server

      - name: Lint CSS (Strict Stylelint)
        # This catches neon, mirroring, and "random stuff" via property blocking
        run: npx stylelint "src/**/*.css" --config .stylelintrc.json

  # ─────────────────────────────────────────────
  # JOB 2 — Backend Health Check
  # ─────────────────────────────────────────────
  backend-check:
    name: Backend Health Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install server dependencies
        run: npm code ci
        working-directory: ./server

      - name: Create server .env
        run: |
          echo "PORT=3001" >> ./server/.env
          echo "CLIENT_ORIGIN=http://localhost:4173" >> ./server/.env
          echo "FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_CRUNCH_4735E }}" >> ./server/.env

      - name: Start server and health check
        run: |
          node server/index.js &
          sleep 10
          curl --fail --retry 3 http://localhost:3001/health || (echo "Health check failed" && exit 1)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_CRUNCH_4735E }}

  # ─────────────────────────────────────────────
  # JOB 3 — Build (Only on Push)
  # ─────────────────────────────────────────────
  build:
    name: Build (Vite Production)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file (Full Injection)
        run: |
          echo "VITE_NOTIFICATION_SERVER=${{ secrets.VITE_NOTIFICATION_SERVER }}" >> .env
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" >> .env
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env

      - name: Build (Vite)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 4 — Visual Regression (THE GATEKEEPER)
  # ─────────────────────────────────────────────
  visual-tests:
    name: Visual Regression (Strict comparison)
    runs-on: ubuntu-latest
    needs: [build, backend-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Strict Comparison (No updates)
        run: |
          npx serve -s dist -p 4173 &
          sleep 5
          npx playwright test tests/visual.spec.js --workers=1
        env:
          CI: true

      - name: Upload Failure Diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 5a — Deploy to STAGING
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Firebase Staging Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_CRUNCH_4735E }}
          projectId: the-crunch-4735e
          channelId: staging

  # ─────────────────────────────────────────────
  # JOB 5b — Deploy to PRODUCTION (with rollback)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Firebase Production
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" 2>&1)
          echo "$DEPLOY_OUTPUT"
          VERSION=$(echo "$DEPLOY_OUTPUT" | grep -oP 'releases/\K[^\s]+' | head -1)
          echo "release_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rollback on deploy failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back to previous release..."
          firebase hosting:rollback --token "${{ secrets.FIREBASE_TOKEN }}" --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}"

      - name: Summarize deployment
        if: success()
        run: |
          echo "## ✅ Production Deploy Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** ${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 5c — Deploy Backend to Railway
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --path-as-root ./server --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Health check Railway API
        run: |
          sleep 30
          curl -f -L ${{ secrets.VITE_API_URL }}/health || (echo "Railway check failed" && exit 1)

  # ─────────────────────────────────────────────
  # JOB 6 — Auto-Merge Staging to Main
  # ─────────────────────────────────────────────
  promote-to-main:
    name: Promote Staging to Main
    runs-on: ubuntu-latest
    needs: [visual-tests, deploy-staging, deploy-backend]
    if: success() && github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Merge Staging into Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge staging --no-ff -m "Auto: Promote Staging to Main (Visuals Verified)"
          git push origin main

  # ─────────────────────────────────────────────
  # JOB 7 — Auto Revert Bad Commit on Main
  # ─────────────────────────────────────────────
  auto-revert:
    name: Auto Revert Bad Commit
    runs-on: ubuntu-latest
    needs: [visual-tests]
    if: failure() && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Revert bad commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git revert HEAD --no-edit
          git push origin main
