name: The Crunch — CI/CD Pipeline
# ENV STRUCTURE:
#   Root .env     → VITE_NOTIFICATION_SERVER + VITE_FIREBASE_* (all VITE_ prefixed for Vite)
#   server/.env   → PORT, CLIENT_ORIGIN (server-side only, never exposed to browser)
#   firebase.js   → reads from import.meta.env.VITE_* (not hardcoded)

on:
  push:
    branches:
      - main        # triggers production deploy
      - staging     # triggers staging deploy
  pull_request:
    branches:
      - main
      - staging     # lint + test only, no deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Lint & Test (runs on every push/PR)
  # ─────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: ./server

      # COUNTER TEST 1 & 3: Strict Linting + Visual Sabotage Scan
      - name: Lint frontend
        run: |
          npm run lint -- --max-warnings 0
          if grep -qE "rotate\(|scaleX\(|filter: invert" src/App.jsx; then
            echo "❌ Visual Sabotage (CSS Injection) detected in App.jsx!" && exit 1
          fi

      - name: Lint backend
        run: npm run lint -- --max-warnings 0
        working-directory: ./server

      - name: Lint CSS (Stylelint)
        run: npx stylelint "src/**/*.css" --config .stylelintrc.json

      # COUNTER TEST 4: Run frontend tests (Logic Bouncer)
      - name: Run frontend tests
        run: npm run test

      # COUNTER TEST 4: Run backend tests
      - name: Run backend tests
        run: npm test
        working-directory: ./server

  # ─────────────────────────────────────────────
  # JOB 2 — Backend Health Check
  # ─────────────────────────────────────────────
  backend-check:
    name: Backend Health Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install server dependencies
        run: npm ci
        working-directory: ./server

      - name: Create server .env
        run: |
          echo "PORT=3001" >> ./server/.env
          echo "CLIENT_ORIGIN=${{ secrets.CLIENT_ORIGIN }}" >> ./server/.env
          echo "FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_CRUNCH_4735E }}" >> ./server/.env

      - name: Start server and health check
        run: |
          node server/index.js &
          sleep 5
          curl --fail http://localhost:3001/health || (echo "Health check failed" && exit 1)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_CRUNCH_4735E }}

  # ─────────────────────────────────────────────
  # JOB 3 — Build (STOPS TEST 2: Syntax Bouncer)
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "VITE_NOTIFICATION_SERVER=${{ secrets.VITE_NOTIFICATION_SERVER }}" >> .env
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" >> .env
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env

      - name: Build (Vite)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 4 — Visual Regression (STOPS TEST 3 & 5)
  # ─────────────────────────────────────────────
  visual-tests:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: [build, backend-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run and Update snapshots
        run: |
          npx serve -s dist -p 4173 &
          sleep 5
          npx playwright test tests/visual.spec.js --update-snapshots
        env:
          CI: true

      - name: Upload New Snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: new-linux-snapshots
          path: tests/__snapshots__/
          retention-days: 1

  # ─────────────────────────────────────────────
  # DEPLOYMENT & PROMOTION (Protected by Jobs 1-4)
  # ─────────────────────────────────────────────

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Deploy to Firebase Staging
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_CRUNCH_4735E }}
          projectId: the-crunch-4735e
          channelId: staging

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Deploy to Firebase Production
        id: deploy
        run: |
          DEPLOYS=$(firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" 2>&1)
          VERSION=$(echo "$DEPLOYS" | grep -oP 'releases/\K[^\s]+' | head -1)
          echo "release_version=$VERSION" >> $GITHUB_OUTPUT
      - name: Rollback on deploy failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: firebase hosting:rollback --token "${{ secrets.FIREBASE_TOKEN }}" --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}"

  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --path-as-root ./server --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Health check Railway API
        run: |
          sleep 30
          curl -f -L ${{ secrets.VITE_API_URL }}/health || exit 1

  promote-to-main:
    name: Promote Staging to Main
    runs-on: ubuntu-latest
    needs: [visual-tests, deploy-staging, deploy-backend]
    if: success() && github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Merge Staging into Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge staging --no-ff -m "Auto: Promote Staging to Main"
          git push origin main

  auto-revert:
    name: Auto Revert Bad Commit
    runs-on: ubuntu-latest
    needs: [lint-and-test, build, backend-check, visual-tests]
    if: |
      failure() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Revert bad commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git revert HEAD --no-edit
          git push origin main
