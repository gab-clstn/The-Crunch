name: The Crunch — CI/CD Pipeline
# ENV STRUCTURE:
#   Root .env     → VITE_NOTIFICATION_SERVER + VITE_FIREBASE_* (all VITE_ prefixed for Vite)
#   server/.env   → PORT, CLIENT_ORIGIN (server-side only, never exposed to browser)
#   firebase.js   → reads from import.meta.env.VITE_* (not hardcoded)

on:
  push:
    branches:
      - main        # triggers production deploy
      - staging     # triggers staging deploy
  pull_request:
    branches:
      - main
      - staging     # lint + test only, no deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Lint & Test (runs on every push/PR)
  # ─────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ── Install root dependencies (React/Vite app)
      - name: Install frontend dependencies
        run: npm ci

      # ── Install server dependencies
      - name: Install server dependencies
        run: npm ci
        working-directory: ./server

      # ── Lint the frontend (uses your eslint.config.js)
      - name: Lint frontend
        run: npm run lint

      # ── Lint the backend
      - name: Lint backend
        run: npm run lint
        working-directory: ./server

      # ── Lint CSS files (catches broken/invalid CSS syntax)
      # Catches: invalid hex colors, unknown properties, bad selectors,
      # unknown units, duplicate properties — signs of a broken CSS file
      - name: Lint CSS (Stylelint)
        run: npx stylelint "src/**/*.css" --config .stylelintrc.json

      # ── Run frontend tests (if you add Vitest/Jest later)
      # - name: Run frontend tests
      #   run: npm run test

      # ── Run backend tests (if you add Jest/Mocha later)
      # - name: Run backend tests
      #   run: npm test
      #   working-directory: ./server

  # ─────────────────────────────────────────────
  # JOB 2 — Backend Health Check
  # Spins up the server locally and pings /health
  # ─────────────────────────────────────────────
  backend-check:
    name: Backend Health Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install server dependencies
        run: npm ci
        working-directory: ./server

      # Inject server-side env vars so the app boots correctly
      - name: Create server .env
        run: |
          echo "PORT=3001" >> ./server/.env
          echo "CLIENT_ORIGIN=${{ secrets.CLIENT_ORIGIN }}" >> ./server/.env
          echo "FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_CRUNCH_4735E }}" >> ./server/.env

      - name: Start server and health check
        run: |
          node server/index.js &
          sleep 5
          curl --fail http://localhost:3001/health || (echo "Health check failed" && exit 1)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_CRUNCH_4735E }}

  # ─────────────────────────────────────────────
  # JOB 3 — Build (runs after lint passes)
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only build on actual pushes (not PRs)
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Inject all env variables from GitHub Secrets
      - name: Create .env file
        run: |
          echo "VITE_NOTIFICATION_SERVER=${{ secrets.VITE_NOTIFICATION_SERVER }}" >> .env
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" >> .env
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env

      - name: Build (Vite)
        run: npm run build

      # ── Save the dist/ folder for later jobs
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 4 — Visual Regression Tests (Playwright)
  # FIXED: Now COMPARES against committed baseline
  # snapshots instead of --update-snapshots which
  # always passed even with broken CSS/layout.
  # ─────────────────────────────────────────────
  visual-tests:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: [build, backend-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Compares against committed baseline snapshots in tests/__snapshots__/
      # Will FAIL if any visual difference is detected
      - name: Run visual regression tests
        run: |
          npx serve -s dist -p 4173 &
          sleep 5
          npx playwright test tests/visual.spec.js
        env:
          CI: true

      # Upload diff report only on failure so you can see what broke
      - name: Upload Playwright Failure Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failure-report
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 5a — Deploy to STAGING
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Firebase Staging Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_CRUNCH_4735E }}
          projectId: the-crunch-4735e
          channelId: staging

  # ─────────────────────────────────────────────
  # JOB 5b — Deploy to PRODUCTION (with rollback)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # ── Deploy and capture the version ID for potential rollback
      - name: Deploy to Firebase Production
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" 2>&1)
          echo "$DEPLOY_OUTPUT"
          VERSION=$(echo "$DEPLOY_OUTPUT" | grep -oP 'releases/\K[^\s]+' | head -1)
          echo "release_version=$VERSION" >> $GITHUB_OUTPUT

      # ── If deploy step failed, roll back to the previous release
      - name: Rollback on deploy failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "Deploy failed — rolling back to previous release..."
          firebase hosting:rollback \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}"

      - name: Summarize deployment
        if: success()
        run: |
          echo "## ✅ Production Deploy Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** ${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Summarize rollback
        if: failure()
        run: |
          echo "## ⚠️ Deploy Failed — Rolled Back" >> $GITHUB_STEP_SUMMARY
          echo "- The previous stable release has been restored." >> $GITHUB_STEP_SUMMARY
          echo "- Check the Playwright report artifact for UI issues." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 5c — Deploy Backend to Railway
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --path-as-root ./server --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check Railway API
        run: |
          sleep 30
          curl -f -L -v ${{ secrets.VITE_API_URL }}/health || (echo "Railway health check failed" && exit 1)

      - name: Summarize backend deployment
        if: success()
        run: |
          echo "## ✅ Backend Deploy Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ secrets.RAILWAY_SERVICE_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API URL:** ${{ secrets.VITE_API_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Summarize backend failure
        if: failure()
        run: |
          echo "## ⚠️ Backend Deploy Failed" >> $GITHUB_STEP_SUMMARY
          echo "- Railway deployment or health check did not succeed." >> $GITHUB_STEP_SUMMARY
          echo "- Check Railway logs at https://railway.app" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 6 — Auto-Merge Staging to Main
  # ─────────────────────────────────────────────
  promote-to-main:
    name: Promote Staging to Main
    runs-on: ubuntu-latest
    needs: [visual-tests, deploy-staging, deploy-backend]
    if: success() && github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Merge Staging into Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main
          git merge staging --no-ff -m "Auto: Promote Staging to Main"

          git push origin main

  # ─────────────────────────────────────────────
  # JOB 7 — Auto Revert Bad Commit on Main
  # Triggers if ANY job fails on a direct push to main
  # This is the safety net when ruleset is disabled —
  # if broken code lands on main, this reverts it automatically
  # ─────────────────────────────────────────────
  auto-revert:
    name: Auto Revert Bad Commit
    runs-on: ubuntu-latest
    needs: [lint-and-test, build, backend-check, visual-tests]
    # Only triggers when:
    # 1. Any of the above jobs FAILED
    # 2. It's a direct push to main (not staging)
    # 3. It's not triggered by the auto-merge bot itself
    if: |
      failure() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Revert bad commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Revert the last commit that broke the pipeline
          git revert HEAD --no-edit

          git push origin main

      - name: Summarize revert
        if: success()
        run: |
          echo "## ⚠️ Bad Commit Detected — Auto Reverted" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit reverted:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Pushed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Reason:** One or more pipeline checks failed" >> $GITHUB_STEP_SUMMARY
          echo "- Main branch has been restored to the last working version." >> $GITHUB_STEP_SUMMARY