name: The Crunch — Secure CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

# جلوگیری overlapping deployments
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
# ─────────────────────────────────────────────
# JOB 1 — Lint & Test
# ─────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        run: npm ci
        working-directory: ./server

      - name: Lint frontend
        run: npm run lint

      - name: Lint backend
        run: npm run lint
        working-directory: ./server

      # 🚨 Blocks inline <style> injection attacks
      - name: Enforce no inline styles
        run: |
          if grep -r "<style>" src/; then
            echo "❌ Inline <style> tags are not allowed"
            exit 1
          fi

# ─────────────────────────────────────────────
# JOB 2 — Backend Health Check
# ─────────────────────────────────────────────
  backend-check:
    name: Backend Health Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci
        working-directory: ./server

      - name: Create server env
        run: |
          echo "PORT=3001" >> ./server/.env
          echo "CLIENT_ORIGIN=${{ secrets.CLIENT_ORIGIN }}" >> ./server/.env
          echo "FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_CRUNCH_4735E }}" >> ./server/.env

      - name: Start server
        run: node server/index.js &
      
      - name: Wait for server
        run: npx wait-on http://localhost:3001/health

# ─────────────────────────────────────────────
# JOB 3 — Build
# ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      # Use env instead of writing secrets to file
      - name: Build
        run: npm run build
        env:
          VITE_NOTIFICATION_SERVER: ${{ secrets.VITE_NOTIFICATION_SERVER }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# ─────────────────────────────────────────────
# JOB 4 — UI + Visual Tests (HARDENED)
# ─────────────────────────────────────────────
  visual-tests:
    name: UI & Visual Tests
    runs-on: ubuntu-latest
    needs: [build, backend-check]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - run: npx playwright install --with-deps chromium

      - name: Start app
        run: npx serve -s dist -p 4173 &

      - name: Wait for app
        run: npx wait-on http://localhost:4173

      # ❌ NO snapshot auto-update anymore
      - name: Run visual tests
        run: npx playwright test

      # 🛡️ UI sanity check (anti-sabotage)
      - name: UI sanity check
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.goto('http://localhost:4173');

            const style = await page.evaluate(() => {
              const s = getComputedStyle(document.body);
              return {
                transform: s.transform,
                filter: s.filter
              };
            });

            if (style.transform !== 'none' || style.filter !== 'none') {
              console.error('❌ UI SABOTAGE DETECTED');
              process.exit(1);
            }

            await browser.close();
          })();
          "

# ─────────────────────────────────────────────
# JOB 5 — Deploy STAGING
# ─────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.ref == 'refs/heads/staging'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_CRUNCH_4735E }}
          projectId: the-crunch-4735e
          channelId: staging

# ─────────────────────────────────────────────
# JOB 6 — Deploy PRODUCTION (SAFE)
# ─────────────────────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: visual-tests
    if: github.ref == 'refs/heads/main'   # ✅ FIXED

    steps:
      - uses: actions/checkout@v4

      - run: npm install -g firebase-tools

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy
        run: firebase deploy --only hosting \
          --token "${{ secrets.FIREBASE_TOKEN }}" \
          --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
